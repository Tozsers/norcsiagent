<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NorcsiAgent — Live Demo</title>
<style>
:root {
  --bg: #0d1117; --panel: #161b22; --border: #21262d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --yellow: #d29922; --red: #f85149;
  --purple: #bc8cff; --orange: #f0883e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
header { padding: 11px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--panel); }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 7px var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 7px var(--green)} 50%{opacity:.4;box-shadow:none} }
header h1 { font-size: 15px; font-weight: 800; color: var(--purple); flex: 1; }
.agent-count { font-size: 11px; color: var(--muted); }

/* APPROVALS PANEL */
#approvals { display: none; background: #1a1200; border-bottom: 1px solid #3d2e00; padding: 10px 18px; flex-shrink: 0; }
#approvals.visible { display: block; }
.appr-title { font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.appr-count { background: var(--orange); color: #000; font-size: 10px; font-weight: 800; padding: 1px 7px; border-radius: 20px; }
.appr-cards { display: flex; gap: 10px; flex-wrap: wrap; }
.appr-card { background: var(--panel); border: 1px solid #3d2e00; border-radius: 10px; padding: 10px 14px; min-width: 300px; flex: 1; max-width: 500px; }
.appr-agent { font-size: 11px; font-weight: 700; color: var(--orange); margin-bottom: 5px; }
.appr-msg { font-size: 12px; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
.appr-btns { display: flex; gap: 8px; }
.btn-approve { flex: 1; background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
.btn-reject  { flex: 1; background: rgba(248,81,73,.12); color: var(--red);   border: 1px solid rgba(248,81,73,.3); border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }

/* MAIN */
#main { flex: 1; display: flex; overflow: hidden; }

/* GRID */
#grid-wrap { flex: 1; overflow-y: auto; }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; padding: 14px; }

/* CARD */
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; transition: border-color .3s; }
.card.running { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(88,166,255,.1); }
.card.done    { border-color: #1d2d4a; }
.card.approval_needed { border-color: var(--orange); }
.card-header { padding: 12px 14px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.avatar { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.card-name { font-weight: 700; font-size: 13px; }
.card-id { font-size: 10px; color: var(--muted); }
.badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: .04em; }
.badge-running  { background: rgba(88,166,255,.15); color: var(--accent); }
.badge-done     { background: rgba(63,185,80,.12); color: var(--green); }
.badge-idle     { background: rgba(139,148,158,.1); color: var(--muted); }
.badge-approval { background: rgba(240,136,62,.15); color: var(--orange); }
.live-msg { padding: 10px 14px; min-height: 44px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.live-txt { flex: 1; }
.live-txt.on { color: var(--text); }
.cursor { display: inline-block; width: 2px; height: 12px; background: var(--accent); vertical-align: middle; animation: blink .7s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
.event-log { flex: 1; padding: 8px 14px; display: flex; flex-direction: column; gap: 4px; min-height: 100px; max-height: 140px; overflow: hidden; }
.ev-row { display: flex; gap: 7px; align-items: baseline; font-size: 11px; opacity: 0; animation: fadeIn .35s ease forwards; }
@keyframes fadeIn { to { opacity: 1; } }
.ev-t { color: var(--muted); font-size: 10px; min-width: 44px; }
.ev-type { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; }
.t-thinking { background: rgba(210,153,34,.15); color: var(--yellow); }
.t-tool     { background: rgba(88,166,255,.15); color: var(--accent); }
.t-result   { background: rgba(63,185,80,.12); color: var(--green); }
.t-approval { background: rgba(240,136,62,.15); color: var(--orange); }
.ev-msg { color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; }
.card-footer { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
.cmd-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 11px; color: var(--muted); outline: none; }
.cmd-btn  { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
.stop-btn { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); border-radius: 6px; padding: 5px 8px; font-size: 11px; cursor: pointer; }
.log-btn  { background: rgba(139,148,158,.1); color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 11px; cursor: pointer; }

/* LIVE FEED */
#feed { width: 280px; flex-shrink: 0; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
.feed-header { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.feed-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
#feed-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 4px 0; }
.feed-row { display: flex; gap: 6px; align-items: flex-start; padding: 5px 10px; border-bottom: 1px solid rgba(33,38,45,.6); animation: slideIn .3s ease; }
@keyframes slideIn { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:none; } }
.feed-time { font-size: 9px; color: var(--muted); white-space: nowrap; padding-top: 2px; min-width: 40px; }
.feed-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; white-space: nowrap; max-width: 70px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.feed-dot-type { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.fd-thinking { background: var(--yellow); }
.fd-tool     { background: var(--green); }
.fd-result   { background: var(--accent); }
.fd-approval { background: var(--orange); }
.fd-error    { background: var(--red); }
.feed-msg { font-size: 10px; color: var(--muted); word-break: break-word; flex: 1; line-height: 1.4; }

::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="live-dot"></div>
  <h1>NorcsiAgent Dashboard</h1>
  <span class="agent-count" id="cnt">0 agents</span>
</header>

<div id="approvals">
  <div class="appr-title">⏳ Pending Approvals <span class="appr-count" id="appr-n">0</span></div>
  <div class="appr-cards" id="appr-cards"></div>
</div>

<div id="main">
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="feed">
    <div class="feed-header"><div class="feed-dot"></div>Live Event Feed</div>
    <div id="feed-list"></div>
  </div>
</div>

<script>
const AGENTS = [
  { id:"researcher", name:"Research Agent", icon:"🔍", color:"#58a6ff",
    seq:[
      {d:500,  type:"thinking", msg:"Analyzing topic clusters..."},
      {d:1800, type:"tool",    msg:"knowledge_search(topic=trends, depth=3)"},
      {d:3200, type:"tool",    msg:"summarize(items=42, mode=extractive)"},
      {d:4800, type:"thinking",msg:"Scoring relevance for each cluster..."},
      {d:7200, type:"result",  msg:"Analysis complete — 3 high-relevance clusters identified."},
    ]},
  { id:"writer", name:"Writer Agent", icon:"✍️", color:"#bc8cff",
    seq:[
      {d:700,  type:"thinking", msg:"Planning section structure..."},
      {d:2200, type:"tool",    msg:"generate(model=haiku, tokens=2048, style=narrative)"},
      {d:5100, type:"thinking",msg:"Checking tone consistency..."},
      {d:7800, type:"result",  msg:"Section complete — 1,847 words, readability OK."},
    ]},
  { id:"planner", name:"Task Planner", icon:"🗂️", color:"#f0883e",
    seq:[
      {d:400,  type:"thinking",msg:"Loading task backlog..."},
      {d:1600, type:"tool",   msg:"prioritize(tasks=18, strategy=impact_effort)"},
      {d:3000, type:"thinking",msg:"Detecting blocked dependencies..."},
      {d:4200, type:"tool",   msg:"schedule(slots=5, horizon=7d)"},
      {d:5800, type:"approval",msg:"Execute plan for next 7 days? 5 tasks, 2 reviews — confirm"},
    ]},
  { id:"monitor", name:"Health Monitor", icon:"🩺", color:"#3fb950",
    seq:[
      {d:1000, type:"thinking",msg:"Running system checks..."},
      {d:2400, type:"tool",   msg:"check(service=pipeline_a, metric=latency)"},
      {d:3700, type:"tool",   msg:"check(service=pipeline_b, metric=error_rate)"},
      {d:5000, type:"thinking",msg:"Comparing against baseline thresholds..."},
      {d:6500, type:"result", msg:"All services nominal. Avg latency 142ms. No anomalies."},
    ]},
];

const COLORS = {"#58a6ff":"#58a6ff22","#bc8cff":"#bc8cff22","#f0883e":"#f0883e22","#3fb950":"#3fb95022"};

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');
}

function buildCard(a) {
  const c = document.createElement('div');
  c.className = 'card'; c.id = 'c-'+a.id;
  c.innerHTML = `
    <div class="card-header">
      <div class="avatar" style="background:${COLORS[a.color]||'#ffffff11'}">${a.icon}</div>
      <div style="flex:1"><div class="card-name">${a.name}</div><div class="card-id">${a.id}</div></div>
      <span class="badge badge-idle" id="b-${a.id}">IDLE</span>
    </div>
    <div class="live-msg" id="lm-${a.id}">
      <span class="live-txt" id="lt-${a.id}">Waiting for task...</span>
    </div>
    <div class="event-log" id="log-${a.id}"></div>
    <div class="card-footer">
      <input class="cmd-input" placeholder="Send command...">
      <button class="cmd-btn">Send ▶</button>
      <button class="stop-btn">⏹</button>
      <button class="log-btn">⬇</button>
    </div>`;
  return c;
}

function addEvent(aid, type, msg) {
  const log = document.getElementById('log-'+aid);
  const r = document.createElement('div'); r.className='ev-row';
  const tc = {thinking:'t-thinking',tool:'t-tool',result:'t-result',approval:'t-approval'}[type]||'t-tool';
  const tl = {thinking:'think',tool:'tool',result:'result',approval:'approval'}[type]||type;
  r.innerHTML=`<span class="ev-t">${now()}</span><span class="ev-type ${tc}">${tl}</span><span class="ev-msg">${msg}</span>`;
  log.appendChild(r);
  while(log.children.length>5) log.removeChild(log.firstChild);
}

function addFeed(agent, type, msg) {
  const fl = document.getElementById('feed-list');
  const r = document.createElement('div'); r.className='feed-row';
  const dc = {thinking:'fd-thinking',tool:'fd-tool',result:'fd-result',approval:'fd-approval',error:'fd-error'}[type]||'fd-tool';
  const color = agent.color;
  r.innerHTML=`<span class="feed-time">${now()}</span><span class="feed-badge" style="background:${color}22;color:${color}">${agent.name.split(' ')[0]}</span><div class="feed-dot-type ${dc}"></div><span class="feed-msg">${msg}</span>`;
  fl.prepend(r);
  while(fl.children.length>60) fl.removeChild(fl.lastChild);
}

let approvalCount = 0;
function addApproval(agent, msg) {
  approvalCount++;
  const panel = document.getElementById('approvals');
  panel.classList.add('visible');
  document.getElementById('appr-n').textContent = approvalCount;
  const key = 'a'+Date.now();
  const card = document.createElement('div'); card.className='appr-card'; card.id=key;
  card.innerHTML=`<div class="appr-agent">⏳ ${agent.name}</div><div class="appr-msg">${msg}</div><div class="appr-btns"><button class="btn-approve" onclick="resolve('${key}')">✅ Approve</button><button class="btn-reject" onclick="resolve('${key}')">❌ Reject</button></div>`;
  document.getElementById('appr-cards').appendChild(card);
}
function resolve(key) {
  document.getElementById(key)?.remove();
  approvalCount = Math.max(0, approvalCount-1);
  document.getElementById('appr-n').textContent = approvalCount;
  if(approvalCount===0) document.getElementById('approvals').classList.remove('visible');
}

function setBadge(aid, status) {
  const b = document.getElementById('b-'+aid);
  const c = document.getElementById('c-'+aid);
  if(!b) return;
  b.className = 'badge badge-'+status;
  b.textContent = status.toUpperCase();
  c.className = 'card '+status;
}

function setLive(aid, msg, active) {
  const lt = document.getElementById('lt-'+aid);
  if(!lt) return;
  lt.className = 'live-txt'+(active?' on':'');
  lt.innerHTML = msg + (active ? '<span class="cursor"></span>' : '');
}

// Build grid
const grid = document.getElementById('grid');
AGENTS.forEach(a => { grid.appendChild(buildCard(a)); });
document.getElementById('cnt').textContent = AGENTS.length+' agents';

// Animate
let maxDelay = 0;
AGENTS.forEach(a => {
  a.seq.forEach((step, i) => {
    if(step.d > maxDelay) maxDelay = step.d;
    setTimeout(() => {
      const isLast = i === a.seq.length-1;
      const status = isLast ? (step.type==='result'?'done':(step.type==='approval'?'approval_needed':'done')) : 'running';
      setBadge(a.id, status);
      setLive(a.id, step.msg, !isLast);
      addEvent(a.id, step.type, step.msg);
      addFeed(a, step.type, step.msg);
      if(step.type==='approval') addApproval(a, step.msg);
    }, step.d);
  });
});

// Loop
setTimeout(() => setTimeout(() => location.reload(), 3000), maxDelay + 2000);
</script>
</body>
</html>
